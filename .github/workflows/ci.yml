name: CI

# This workflow tests Blit-Tech Demos only.
# The Blit-Tech library is cloned and built as a dependency,
# but is NOT tested here (it has its own CI in vancura/blit-tech).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-checks:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Set up workspace
        uses: ./.github/actions/workspace-setup

      - name: Check formatting
        run: |
          cd blit-tech-demos
          pnpm format:check

      - name: Lint code
        run: |
          cd blit-tech-demos
          pnpm lint

      - name: Type check
        run: |
          cd blit-tech-demos
          pnpm typecheck

      - name: Spell check
        run: |
          cd blit-tech-demos
          pnpm spellcheck

      - name: Check for unused exports
        run: |
          cd blit-tech-demos
          pnpm knip

  docs-links:
    name: Check Documentation Links
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          use-verbose-mode: 'yes'
          file-path: './README.md'

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: quality-checks

    steps:
      - name: Set up workspace
        uses: ./.github/actions/workspace-setup

      - name: Build demos
        run: |
          cd blit-tech-demos
          pnpm build
        env:
          NODE_ENV: production

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: demos-dist
          path: blit-tech-demos/dist/
          if-no-files-found: error
          retention-days: 7
          compression-level: 9

  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: [build, docs-links]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: demos-dist
          path: dist/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/ --project-name=blit-tech-demos
