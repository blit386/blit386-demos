name: CI

# This workflow tests Blit-Tech Demos only.
# The Blit-Tech library is cloned and built as a dependency,
# but is NOT tested here (it has its own CI in vancura/blit-tech).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-checks:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Blit-Tech library
        uses: actions/checkout@v6
        with:
          repository: vancura/blit-tech
          path: blit-tech

      - name: Checkout Blit-Tech Demos
        uses: actions/checkout@v6
        with:
          path: blit-tech-demos

      - name: Create workspace config
        run: |
          cat > pnpm-workspace.yaml << EOF
          packages:
            - 'blit-tech'
            - 'blit-tech-demos'
          EOF
          cp blit-tech/pnpm-lock.yaml pnpm-lock.yaml

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Blit-Tech library (dependency - not tested here)
        run: |
          cd blit-tech
          pnpm build

      - name: Check formatting
        run: |
          cd blit-tech-demos
          pnpm format:check

      - name: Lint code
        run: |
          cd blit-tech-demos
          pnpm lint

      - name: Type check
        run: |
          cd blit-tech-demos
          pnpm typecheck

      - name: Spell check
        run: |
          cd blit-tech-demos
          pnpm spellcheck

      - name: Check for unused exports
        run: |
          cd blit-tech-demos
          pnpm knip

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: quality-checks

    steps:
      - name: Checkout Blit-Tech library
        uses: actions/checkout@v6
        with:
          repository: vancura/blit-tech
          path: blit-tech

      - name: Checkout Blit-Tech Demos
        uses: actions/checkout@v6
        with:
          path: blit-tech-demos

      - name: Create workspace config
        run: |
          cat > pnpm-workspace.yaml << EOF
          packages:
            - 'blit-tech'
            - 'blit-tech-demos'
          EOF
          cp blit-tech/pnpm-lock.yaml pnpm-lock.yaml

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Blit-Tech library
        run: |
          cd blit-tech
          pnpm build

      - name: Build demos
        run: |
          cd blit-tech-demos
          pnpm build
        env:
          NODE_ENV: production

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: demos-dist
          path: blit-tech-demos/dist/
          retention-days: 7
          compression-level: 9

  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: demos-dist
          path: dist/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/ --project-name=blit-tech-demos
