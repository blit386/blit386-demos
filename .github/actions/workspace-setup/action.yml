name: Workspace Setup
description: Checkout repos, create pnpm workspace, install dependencies, and build the Blit-Tech library.

runs:
  using: composite

  steps:
    - name: Checkout Blit-Tech library
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        repository: vancura/blit-tech
        ref: main
        path: blit-tech

    - name: Checkout Blit-Tech Demos
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        path: blit-tech-demos

    - name: Create workspace config
      shell: bash
      run: |
        cat > pnpm-workspace.yaml << EOF
        packages:
          - 'blit-tech'
          - 'blit-tech-demos'
        EOF
        cp blit-tech/pnpm-lock.yaml pnpm-lock.yaml

    - name: Setup pnpm
      uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
      with:
        version: 10.26.2

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: '22.18.0'
        cache: 'pnpm'

    - name: Install dependencies
      shell: bash
      run: pnpm install --no-frozen-lockfile

    - name: Build Blit-Tech library
      shell: bash
      run: |
        cd blit-tech
        pnpm run build
