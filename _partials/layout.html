<!doctype html>

<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{{title}}</title>
        <style>
            :root {
                --color-accent: #5da0f2;
            }

            *,
            *::before,
            *::after {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                background: #111;
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            #canvas-container canvas {
                display: block;
                image-rendering: pixelated;
                width: 100% !important;
                height: 100% !important;
            }

            @supports (image-rendering: crisp-edges) {
                #canvas-container canvas {
                    image-rendering: crisp-edges;
                }
            }

            #canvas-container {
                width: 100%;
                min-height: 100vh;
            }
        </style>
    </head>

    <body>
        <div id="canvas-container"><canvas id="blit-tech-canvas"></canvas></div>
        <script type="module" src="{{scriptFile}}.js"></script>
    </body>
</html>
